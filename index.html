<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>Throne and Liberty - Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=Montserrat:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0c0e12;
            --panel-bg: #11151c;
            --border-color: #2a2e38;
            --gold-accent: #d4af37;
            --text-main: #e0e0e0;
            --prog-bar-bg: #1a1e26;
            --prog-fill: #8a63f0;
        }

        body { background-color: var(--bg-color); color: var(--text-main); font-family: 'Montserrat', sans-serif; padding: 20px; }
        .container { max-width: 1100px; margin: auto; background: var(--panel-bg); border: 1px solid var(--border-color); padding: 20px; border-radius: 8px; position: relative; }
        header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px; border-bottom: 1px solid var(--border-color); padding-bottom: 15px; }
        h1 { font-family: 'Cinzel', serif; color: var(--gold-accent); margin: 0; font-size: 24px; }
        .main-grid { display: grid; grid-template-columns: 1fr 1.5fr; gap: 20px; }
        .section-title { display: flex; justify-content: space-between; align-items: center; font-family: 'Cinzel', serif; color: var(--gold-accent); margin-bottom: 10px; font-size: 18px; }
        .progress-container { background: var(--prog-bar-bg); height: 8px; border-radius: 4px; margin-bottom: 15px; overflow: hidden; }
        .progress-fill { height: 100%; background: var(--prog-fill); width: 0%; transition: width 0.3s; }
        .task-list { display: grid; grid-template-columns: 1fr; gap: 8px; }
        .grid-2col { grid-template-columns: 1fr 1fr; }
        .task-item { display: flex; align-items: center; gap: 10px; padding: 8px; background: rgba(255,255,255,0.03); border-radius: 4px; cursor: pointer; border: 1px solid transparent; }
        .task-item:hover { border: 1px solid var(--border-color); }
        .task-item.checked { opacity: 0.5; text-decoration: line-through; }
        input[type="checkbox"] { accent-color: var(--gold-accent); width: 16px; height: 16px; cursor: pointer; }
        .signature { position: absolute; bottom: 10px; right: 20px; font-family: 'Cinzel', serif; font-size: 12px; color: var(--gold-accent); opacity: 0.6; }
    </style>
</head>
<body>

<div class="container">
    <header>
        <div>
            <h1 id="main-title">⚔️ THRONE AND LIBERTY - MASTER DASHBOARD</h1>
            <div style="font-size: 12px; margin-top: 5px;" id="reset-info">🔄 RESET GIORNALIERO: 03:37:20 | 🔄 RESET SETTIMANALE (GIOVEDÌ): 4G 03:37:20</div>
        </div>
        <button id="lang-btn" onclick="toggleLanguage()" style="background:none; border:1px solid var(--border-color); color:white; padding:5px 15px; cursor:pointer;">🌐 IT / EN</button>
    </header>

    <div class="main-grid">
        <div>
            <div class="section-title"><span id="title-daily">☀️ GIORNALIERO</span> <span>0/8</span></div>
            <div class="progress-container"><div class="progress-fill" id="pb-daily" style="width: 0%"></div></div>
            <div class="task-list" id="list-dailies"></div>
            
            <div class="section-title" style="margin-top: 20px;"><span id="title-monthly">🌙 MENSILE</span> <span>0/1</span></div>
            <div class="progress-container"><div class="progress-fill" id="pb-monthly" style="width: 0%"></div></div>
            <div class="task-list" id="list-monthlies"></div>
        </div>

        <div>
            <div class="section-title"><span id="title-weekly">🗓️ SETTIMANALE</span> <span>0/17</span></div>
            <div class="progress-container"><div class="progress-fill" id="pb-weekly" style="width: 0%"></div></div>
            <div class="task-list grid-2col" id="list-weeklies"></div>
        </div>
    </div>
    
    <div class="signature">creato da DOMINATORITA</div>
</div>

<script>
    let isItalian = true;
    const db = {
        dailies: { IT: ["Comprare Stellarite Talandre", "Comprare contratti e pietre", "Fare Missioni medaglie", "Completa 10 contratti a nix", "Completa 2 Contratti Flames", "Dungeon Elite e Epic", "Solo dungeon nix", "Missioni evento nix (opzionale)"], EN: ["Buy Talandre Stellarite", "Buy contracts & stones", "Do Medallion missions", "Complete 10 Nix contracts", "Complete 2 Flames contracts", "Elite & Epic Dungeons", "Solo Nix dungeon", "Nix event missions (optional)"] },
        weeklies: { IT: ["Raid Normal", "Raid Hard", "Raid Nightmare (boss finale)", "Scarico punti Nix", "Hall of illusion", "Trial (punti completamento)", "Trial Golden chest", "Battleground 800 punti", "Battleground 10 win", "Comprare libri Piccioni", "Comprare chiavi Contratti", "Comprare negozio Battleground", "Evento 1", "Contratti mastery torre", "Evento 2", "5 chiavi", "7 Eventi"], EN: ["Raid Normal", "Raid Hard", "Raid Nightmare (final boss)", "Nix points dump", "Hall of illusion", "Trial (completion points)", "Trial Golden chest", "Battleground 800 points", "Battleground 10 wins", "Buy Pigeon books", "Buy Contract tokens", "Buy Battleground shop", "Event 1", "Tower mastery contracts", "Event 2", "5 keys", "7 Events"] },
        monthlies: { IT: ["Torre"], EN: ["Tower"] }
    };

    let state = JSON.parse(localStorage.getItem("tl_state")) || {};

    function toggleLanguage() {
        isItalian = !isItalian;
        render();
    }

    function render() {
        const lang = isItalian ? "IT" : "EN";
        document.getElementById("title-daily").innerText = isItalian ? "☀️ GIORNALIERO" : "☀️ DAILY";
        document.getElementById("title-weekly").innerText = isItalian ? "🗓️ SETTIMANALE" : "🗓️ WEEKLY";
        document.getElementById("title-monthly").innerText = isItalian ? "🌙 MENSILE" : "🌙 MONTHLY";
        
        renderList("list-dailies", db.dailies[lang], "d");
        renderList("list-weeklies", db.weeklies[lang], "w");
        renderList("list-monthlies", db.monthlies[lang], "m");
        updateProgress();
    }

    function renderList(id, items, prefix) {
        const container = document.getElementById(id);
        container.innerHTML = "";
        items.forEach((item, i) => {
            const key = prefix + i;
            const div = document.createElement("div");
            div.className = "task-item " + (state[key] ? "checked" : "");
            div.onclick = () => { state[key] = !state[key]; localStorage.setItem("tl_state", JSON.stringify(state)); render(); };
            div.innerHTML = `<input type="checkbox" ${state[key] ? "checked" : ""}> <span>${item}</span>`;
            container.appendChild(div);
        });
    }

    function updateProgress() {
        const calc = (items, prefix) => items.filter((_, i) => state[prefix + i]).length / items.length * 100;
        document.getElementById("pb-daily").style.width = calc(db.dailies.IT, "d") + "%";
        document.getElementById("pb-weekly").style.width = calc(db.weeklies.IT, "w") + "%";
        document.getElementById("pb-monthly").style.width = calc(db.monthlies.IT, "m") + "%";
    }

    render();
</script>

</body>
</html>
