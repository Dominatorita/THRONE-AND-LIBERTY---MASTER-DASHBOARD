<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<title>T&L Master Dashboard</title>
<style>
:root { --bg: #0c0e12; --panel: #11151c; --border: #2a2e38; --gold: #d4af37; --text: #e0e0e0; --accent: #8a63f0; }
body { background-color: var(--bg); color: var(--text); font-family: sans-serif; padding: 20px; font-size: 14px; }
.container { max-width: 1000px; margin: auto; background: var(--panel); border: 1px solid var(--border); padding: 20px; position: relative; }
header { display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid var(--accent); padding-bottom: 10px; margin-bottom: 20px; }
h1 { color: var(--gold); margin: 0; font-size: 22px; }
.timer-info { font-size: 12px; color: var(--gold); margin-top: 5px; }
.grid { display: grid; grid-template-columns: 1fr 2fr; gap: 20px; }
.col-left { display: flex; flex-direction: column; gap: 20px; }
.section-header { display: flex; justify-content: space-between; color: var(--gold); border-bottom: 2px solid var(--accent); padding-bottom: 5px; margin-bottom: 10px; font-weight: bold; }
.task { padding: 8px; background: rgba(255,255,255,0.03); margin-bottom: 5px; cursor: pointer; display: flex; align-items: center; gap: 10px; }
.task.checked { opacity: 0.5; text-decoration: line-through; }
.grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
.signature { position: absolute; bottom: 20px; right: 20px; font-size: 12px; color: var(--gold); opacity: 0.7; font-weight: bold; }
/* Stile barra */
.progress-bg { height: 4px; background: #000; margin-bottom: 8px; border-radius: 2px; }
.progress-fill { height: 100%; background: var(--gold); width: 0%; transition: width 0.3s; }
</style>
</head>
<body>
<div class="container">
<header>
<div>
<h1>⚔️ THRONE AND LIBERTY - MASTER DASHBOARD</h1>
<div class="timer-info" id="timers">⏳ Caricamento timer...</div>
</div>
<button onclick="toggleLang()" style="background:none; border:1px solid var(--border); color:white; cursor:pointer;">🌐 IT / EN</button>
</header>
<div class="grid">
<div class="col-left">
<div>
<div class="section-header"><span>☀️ GIORNALIERO</span> <span id="count-d">0/0</span></div>
<div class="progress-bg"><div id="pb-d" class="progress-fill"></div></div>
<div id="list-d"></div>
</div>
<div>
<div class="section-header"><span>🌙 MENSILE</span> <span id="count-m">0/0</span></div>
<div class="progress-bg"><div id="pb-m" class="progress-fill"></div></div>
<div id="list-m"></div>
</div>
</div>
<div>
<div class="section-header"><span>🗓️ SETTIMANALE</span> <span id="count-w">0/0</span></div>
<div class="progress-bg"><div id="pb-w" class="progress-fill"></div></div>
<div id="list-w" class="grid-2"></div>
</div>
</div>
<div class="signature">CREATO DA DOMINATORITA</div>
</div>
<script>
let lang = 'IT';
const db = {
d: { IT: ["Comprare Stellarite Talandre", "Comprare contratti e pietre", "Fare Missioni medaglie", "Completa 10 contratti a nix", "Completa 2 Contratti Flames", "Dungeon Elite e Epic", "Solo dungeon nix", "Missioni evento nix (opzionale)"], EN: ["Buy Talandre Stellarite", "Buy contracts & stones", "Do Medallion missions", "Complete 10 Nix contracts", "Complete 2 Flames contracts", "Elite & Epic Dungeons", "Solo Nix dungeon", "Nix event missions (optional)"] },
w: { IT: ["Raid Normal", "Raid Hard", "Raid Nightmare (boss finale)", "Scarico punti Nix", "Hall of illusion", "Trial (punti completamento)", "Trial Golden chest", "Battleground 800 punti", "Battleground 10 win", "Comprare libri Piccioni", "Comprare chiavi Contratti", "Comprare negozio Battleground", "Evento 1", "Contratti mastery torre", "Evento 2", "5 chiavi", "7 Eventi"], EN: ["Raid Normal", "Raid Hard", "Raid Nightmare (final boss)", "Nix points dump", "Hall of illusion", "Trial (completion points)", "Trial Golden chest", "Battleground 800 points", "Battleground 10 wins", "Buy Pigeon books", "Buy Contract tokens", "Buy Battleground shop", "Event 1", "Tower mastery contracts", "Event 2", "5 keys", "7 Events"] },
m: { IT: ["Torre", "Evento extra 1", "Evento extra 2"], EN: ["Tower", "Extra event 1", "Extra event 2"] }
};
let state = JSON.parse(localStorage.getItem("tl_state") || "{}");

function checkAndReset() {
    const now = new Date();
    const currentHour = now.getHours();
    const referenceDate = new Date(now);
    if (currentHour < 4) referenceDate.setDate(now.getDate() - 1);
    const todayStr = referenceDate.toDateString();
    if (localStorage.getItem("lastResetDate") !== todayStr) {
        Object.keys(state).forEach(k => { if(k.startsWith('d') || k.startsWith('m')) delete state[k]; });
        if (referenceDate.getDay() === 4) {
            Object.keys(state).forEach(k => { if(k.startsWith('w')) delete state[k]; });
        }
        localStorage.setItem("lastResetDate", todayStr);
        localStorage.setItem("tl_state", JSON.stringify(state));
    }
}

function toggleLang() { lang = (lang === 'IT' ? 'EN' : 'IT'); render(); }

function render() {
    ['d','w','m'].forEach(cat => {
        const list = document.getElementById('list-' + cat);
        list.innerHTML = "";
        db[cat][lang].forEach((item, i) => {
            const key = cat + i;
            const div = document.createElement("div");
            div.className = "task " + (state[key] ? "checked" : "");
            div.onclick = () => { state[key] = !state[key]; localStorage.setItem("tl_state", JSON.stringify(state)); render(); };
            div.innerHTML = `<input type="checkbox" ${state[key] ? "checked" : ""}> <span>${item}</span>`;
            list.appendChild(div);
        });
        const total = db[cat][lang].length;
        const done = db[cat][lang].filter((_, i) => state[cat + i]).length;
        document.getElementById('count-' + cat).innerText = done + "/" + total;
        document.getElementById('pb-' + cat).style.width = (done / total * 100) + "%";
    });
}

setInterval(() => {
    const n = new Date();
    const r = (t) => t.setHours(4,0,0,0) || t;
    const d = r(new Date(n > r(new Date()) ? new Date().setDate(n.getDate()+1) : new Date()));
    const w = new Date(); w.setDate(w.getDate() + (4 - w.getDay() + 7) % 7); r(w);
    const f = (ms) => `${Math.floor(ms/3600000)}h ${Math.floor((ms%3600000)/60000)}m ${Math.floor((ms%60000)/1000)}s`;
    document.getElementById("timers").innerText = `⏳ RESET GIORNALIERO: ${f(d-n)} | RESET SETTIMANALE (GIOVEDÌ): ${f(w-n)}`;
}, 1000);

checkAndReset();
render();
</script>
</body>
</html>
